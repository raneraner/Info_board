<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הודעה לדשבורד</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background-color: #f0f0f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
    h1 { margin-top: 0; font-size: 24px; color: #333; text-align: center; }
    textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 18px; resize: none; box-sizing: border-box; margin-bottom: 20px; font-family: inherit; }
    textarea:focus { border-color: #007aff; outline: none; }
    button { width: 100%; background-color: #007aff; color: white; border: none; padding: 18px; font-size: 20px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    button:active { background-color: #005bb5; }
    .status { margin-top: 15px; text-align: center; font-size: 16px; min-height: 24px; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <h1>מסר לדשבורד המשפחתי</h1>
    <textarea id="messageBox" placeholder="מה תרצו לכתוב?"></textarea>
    <button onclick="sendMessage()">שלח עדכון</button>
    <div id="statusMsg" class="status"></div>
  </div>

  <script>
    const scriptUrl = "https://script.google.com/macros/s/AKfycbzHCrEqD_oAQ2Q-RIkEwWyvAtbO-5JP_En2yTeJkCR0YdggHOO_1xGQeihaQIy4me9J/exec";

    function sendMessage() {
      const msg = document.getElementById("messageBox").value;
      const statusDiv = document.getElementById("statusMsg");
      
      if (!msg.trim()) {
        statusDiv.textContent = "יש לכתוב הודעה לפני השליחה.";
        statusDiv.style.color = "red";
        return;
      }

      statusDiv.textContent = "שולח...";
      statusDiv.style.color = "black";

      fetch(scriptUrl, {
        method: "POST",
        body: JSON.stringify({ message: msg })
      })
      .then(response => response.json())
      .then(data => {
        if(data.status === "success") {
          statusDiv.textContent = "ההודעה נשלחה בהצלחה!";
          statusDiv.style.color = "green";
          document.getElementById("messageBox").value = "";
        } else {
          statusDiv.textContent = "שגיאה בשליחה.";
          statusDiv.style.color = "red";
        }
      })
      .catch(error => {
        statusDiv.textContent = "שגיאת תקשורת.";
        statusDiv.style.color = "red";
      });
    }
  </script>
</body>
</html>
