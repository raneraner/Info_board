<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Life Dashboard</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* הנדסת משתנים - זכוכית אפל עדכנית */
        :root {
            /* מצב לילה */
            --bg-gradient: linear-gradient(135deg, #0d0d0f 0%, #1a1a24 100%);
            --glass-bg: rgba(30, 30, 35, 0.35); /* שקיפות עמוקה יותר */
            --glass-border: rgba(255, 255, 255, 0.15); /* מסגרת חיצונית מורגשת מעט */
            --glass-inner-glow: inset 0 1px 1px rgba(255, 255, 255, 0.1); /* השתקפות אור פנימית */
            --glass-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.4); /* צל היקפי רך */
            
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --text-accent: #0a84ff;
            
            --divider-color: rgba(255, 255, 255, 0.1);
            --timer-gradient: -webkit-linear-gradient(45deg, #FFD60A, #0a84ff);
        }

        body.light-mode {
            /* מצב יום */
            --bg-gradient: linear-gradient(135deg, #e5e5ea 0%, #f2f2f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-inner-glow: inset 0 1px 2px rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.05);
            
            --text-primary: #1c1c1e;
            --text-secondary: #8e8e93;
            --text-accent: #007aff;
            
            --divider-color: rgba(0, 0, 0, 0.1);
            --timer-gradient: -webkit-linear-gradient(45deg, #ff9500, #007aff);
        }

        body { 
            background: var(--bg-gradient);
            color: var(--text-primary); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
            overflow: hidden; 
            direction: rtl;
            transition: background 1.5s ease, color 1.5s ease;
        }

        /* רשת האריחים */
        #bento-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 20px;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* עיצוב הזכוכית המעודכן */
        .bento-card {
            background: var(--glass-bg);
            /* טשטוש עוצמתי וחידוד צבעים מאחורי הזכוכית */
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            /* שילוב של הצל החיצוני והשתקפות האור הפנימית */
            box-shadow: var(--glass-shadow), var(--glass-inner-glow);
            padding: 24px;
            box-sizing: border-box;
            transition: background 1.5s ease, border 1.5s ease, box-shadow 1.5s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* טיפוגרפיה */
        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-align: right;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* אזור הזמן */
        #clock { font-size: 96px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -2px;}
        #date { font-size: 24px; font-weight: 400; color: var(--text-secondary); margin-top: 8px;}

        /* אזור אקלים */
        #temp { font-size: 82px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1;}
        .weather-metrics { display: flex; justify-content: space-around; margin-top: 20px; border-top: 1px solid var(--divider-color); padding-top: 20px;}
        .metric-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 20px; font-weight: 500;}
        .metric-label { font-size: 14px; color: var(--text-secondary); font-weight: 400;}

        #sunset-icon { stroke: var(--text-primary); transition: stroke 1.5s ease;}

        /* רשימות אירועים */
        .event-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            text-align: right;
            flex-grow: 1;
            overflow-y: auto;
            max-height: 250px;
        }

        .event-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--divider-color);
        }

        .event-item:last-child { border-bottom: none; }

        .event-time {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-accent);
            width: 75px;
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .event-title {
            font-size: 20px;
            font-weight: 500;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            font-size: 18px;
            color: var(--text-secondary);
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }

        /* ספירה לאחור */
        #timer-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px 0;}
        #timer { 
            font-size: 52px; 
            font-weight: 800; 
            background: var(--timer-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    
    <div id="bento-grid">
        
        <div class="col">
            <div class="bento-card" style="flex-grow: 1;">
                <div class="card-title">היום</div>
                <ul id="events-today" class="event-list">
                    <div class="empty-state">טוען נתונים...</div>
                </ul>
            </div>
            
            <div class="bento-card" style="flex-grow: 1;">
                <div class="card-title">מחר</div>
                <ul id="events-tomorrow" class="event-list">
                    <div class="empty-state">טוען נתונים...</div>
                </ul>
            </div>
        </div>

        <div class="col">
            <div class="bento-card" style="align-items: center; padding: 35px 20px;">
                <div id="clock">00:00:00</div>
                <div id="date">--/--/----</div>
            </div>

            <div class="bento-card" style="align-items: center; flex-grow: 1;">
                <div id="temp">--°C</div>
                <div class="weather-metrics" style="width: 100%;">
                    <div class="metric-item">
                        <span id="uv-current">--</span>
                        <span class="metric-label" id="uv-max">שיא היום: --</span>
                    </div>
                    <div class="metric-item">
                        <span id="sunset-time">--:--</span>
                        <span class="metric-label" id="sunset-label">שקיעה</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="bento-card full-width">
            <div id="timer-wrapper">
                <div class="card-title" style="margin-bottom: 0; text-align: center;">☀️ הספירה לאחור לתחילת החופש הגדול 🌊</div>
                <div id="timer">טוען...</div>
            </div>
        </div>

    </div>

    <script>
        // הדבק כאן את כתובת ה-URL שקיבלת מגוגל סקריפט:
        var googleScriptUrl = "https://script.google.com/macros/s/AKfycbziD0jqPMC5zcgw-2MeP-Gd6ADYzmnAYFsc13yccN6Tny5R0yMJe75oHQVqeMNabOaj/exec";

        var sunIconSvg = '<svg id="sunset-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 5px;"><line x1="2" y1="18" x2="22" y2="18"/><path d="M6 18a6 6 0 0 1 12 0"/><line x1="12" y1="5" x2="12" y2="9"/><line x1="5.22" y1="11.22" x2="7.34" y2="13.34"/><line x1="18.78" y1="11.22" x2="16.66" y2="13.34"/></svg>';

        function updateClock() {
            var now = new Date();
            var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            if (h < 10) h = "0" + h; if (m < 10) m = "0" + m; if (s < 10) s = "0" + s;
            document.getElementById("clock").innerHTML = h + ":" + m + ":" + s;
            
            var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById("date").innerHTML = now.toLocaleDateString("he-IL", options);
        }

        function updateWeatherAndTheme() {
            var url = "https://api.open-meteo.com/v1/forecast?latitude=32.01&longitude=34.78&current=temperature_2m,is_day&hourly=uv_index&daily=uv_index_max,sunrise,sunset&timezone=Asia%2FJerusalem";
            
            fetch(url).then(function(r){return r.json()}).then(function(data){
                if (!data || !data.current || !data.hourly || !data.daily) return;

                var tempVal = Math.round(data.current.temperature_2m);
                var tempEl = document.getElementById("temp");
                tempEl.innerHTML = tempVal + "°"; 
                
                var r, g, b;
                if (tempVal <= 20) { r = 10; g = 132; b = 255; } 
                else if (tempVal <= 25) {
                    var p = (tempVal - 20) / 5;
                    r = Math.round(10 + (245 * p)); g = Math.round(132 + (63 * p)); b = Math.round(255 - 255 * p);
                } 
                else if (tempVal <= 30) {
                    var p = (tempVal - 25) / 5;
                    r = 255; g = Math.round(195 - 145 * p); b = 0;
                } 
                else { r = 255; g = 50; b = 0; }
                tempEl.style.color = "rgb(" + r + "," + g + "," + b + ")";

                var currentHour = new Date().getHours();
                var uvCurrent = data.hourly.uv_index[currentHour] !== undefined ? data.hourly.uv_index[currentHour] : "--";
                var uvMax = data.daily.uv_index_max[0];
                document.getElementById("uv-current").innerHTML = "קרינה: " + uvCurrent;
                document.getElementById("uv-max").innerHTML = "שיא היום: " + uvMax;

                var isDay = data.current.is_day === 1;
                document.body.className = isDay ? "light-mode" : "dark-mode";

                var now = new Date();
                var sunsetRaw = data.daily.sunset[0];
                var sunsetDate = sunsetRaw ? new Date(sunsetRaw) : null;
                
                if (sunsetDate && now < sunsetDate) {
                    var sunsetTime = sunsetRaw.split("T")[1].substring(0, 5);
                    document.getElementById("sunset-time").innerHTML = sunsetTime;
                    document.getElementById("sunset-label").innerHTML = "שקיעה " + sunIconSvg;
                } else {
                    var sunriseRaw = data.daily.sunrise[1];
                    var sunriseTime = "--:--";
                    if (sunriseRaw) sunriseTime = sunriseRaw.split("T")[1].substring(0, 5);
                    
                    document.getElementById("sunset-time").innerHTML = sunriseTime;
                    document.getElementById("sunset-label").innerHTML = "זריחה " + sunIconSvg;
                }
            }).catch(function(){});
        }

        function fetchCalendarEvents() {
            if (!googleScriptUrl || googleScriptUrl === "YOUR_URL_HERE") return;
            
            fetch(googleScriptUrl)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var todayList = document.getElementById("events-today");
                var tomorrowList = document.getElementById("events-tomorrow");
                
                todayList.innerHTML = "";
                tomorrowList.innerHTML = "";
                
                if (data.today && data.today.length > 0) {
                    data.today.forEach(function(ev) {
                        todayList.innerHTML += '<li class="event-item"><div class="event-time">' + ev.time + '</div><div class="event-title">' + ev.title + '</div></li>';
                    });
                } else {
                    todayList.innerHTML = '<div class="empty-state">אין אירועים מתוכננים להיום</div>';
                }

                if (data.tomorrow && data.tomorrow.length > 0) {
                    data.tomorrow.forEach(function(ev) {
                        tomorrowList.innerHTML += '<li class="event-item"><div class="event-time">' + ev.time + '</div><div class="event-title">' + ev.title + '</div></li>';
                    });
                } else {
                    tomorrowList.innerHTML = '<div class="empty-state">אין אירועים מתוכננים למחר</div>';
                }
            }).catch(function(){});
        }

        function updateCountdown() {
            var target = new Date(2026, 6, 1, 0, 0, 0); 
            var diff = target - new Date();
            if (diff <= 0) { document.getElementById("timer").innerHTML = "החופש הגדול התחיל!"; return; }
            var d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            
            document.getElementById("timer").innerHTML = d + " ימים " + h + " שעות " + m + " דקות " + s + " שניות ";
        }

        updateClock(); 
        updateCountdown(); 
        updateWeatherAndTheme(); 
        fetchCalendarEvents();

        setInterval(updateClock, 1000); 
        setInterval(updateCountdown, 1000); 
        setInterval(updateWeatherAndTheme, 900000); 
        setInterval(fetchCalendarEvents, 300000); 
    </script>
</body>
</html>
